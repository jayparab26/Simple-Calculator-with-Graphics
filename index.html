<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Colourful Calculator</title>

	<link rel="stylesheet" href="style.css">

</head>
<body>

    <div class='heading'>
	<h1> Simple Calculator </h1>
	</div>

	<main class="calculator-container">
		
		<div class="calculator-screen">
			<input type="text" id="display"readonly placeholder="0">
		</div>
		
		<div class="calculator-buttons">
			<button class="utility" onclick="clearDisplay()">C</button>
			<button class="operator" onclick="appendValue('/')">/</button>
			<button class="operator" onclick="appendValue('*')">*</button>
			<button class="operator" onclick="appendValue('-')">-</button>

			<button class="btn" onclick="appendValue('7')">7</button>
			<button class="btn" onclick="appendValue('8')">8</button>
			<button class="btn" onclick="appendValue('9')">9</button>
			<button class="btn plus" onclick="appendValue('+')">+</button>

			<button class="btn" onclick="appendValue('4')">4</button>
			<button class="btn" onclick="appendValue('5')">5</button>
			<button class="btn" onclick="appendValue('6')">6</button>

			<button class="btn" onclick="appendValue('1')">1</button>
			<button class="btn" onclick="appendValue('2')">2</button>
			<button class="btn" onclick="appendValue('3')">3</button>

			<button class="btn equals" onclick="calculateResult()">=</button>

			<button class="btn zero" onclick="appendValue('0')">0</button>
			<button class="btn" onclick="undoLast()">Undo</button>


		</div>	

	</main>

	<script src="logic.js"></script>

</body>
</html>
